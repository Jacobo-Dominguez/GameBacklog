name: game_backlog
description: "Una aplicación para gestionar tu backlog de videojuegos"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  
  # Gestión de estado
  provider: ^6.1.1
  
  # Base de datos local
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Renderizado HTML para descripciones de RAWG
  #flutter_html: ^3.0.0
  
  # Para abrir enlaces web (sitio oficial del juego)
  url_launcher: ^6.2.0

  # Navegación
  go_router: ^13.0.0
  
  # UI
  google_fonts: ^6.1.0
  
  # Utilidades
  uuid: ^4.2.1
  intl: ^0.18.1
  
  # Encriptación y sesión
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  
  # API y networking
  http: ^1.1.0
  
  # Imágenes de red con cache
  cached_network_image: ^3.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/